{{- if or .Values.retention.enabled .Values.projectQuota.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-project-config
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: harbor-project-config
        image: curlimages/curl:8.5.0
        env:
        - name: HARBOR_URL
          value: {{ .Values.harbor.externalUrl | quote }}
        - name: HARBOR_USER
          valueFrom:
            secretKeyRef:
              name: harbor-admin
              key: username
        - name: HARBOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harbor-admin
              key: password
        - name: PROJECT_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        {{- if .Values.projectQuota.enabled }}
        - name: PROJECT_QUOTA_BYTES
          value: "{{ .Values.projectQuota.defaultQuota }}"
        {{- end }}

        command:
        - /bin/sh
        - -c
        - |
          set -e

          echo "Getting project ID..."

          PROJECT_ID=$(curl -sk \
            -u "$HARBOR_USER:$HARBOR_PASSWORD" \
            "$HARBOR_URL/api/v2.0/projects/$PROJECT_NAME" \
            | jq -r '.project_id')

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "Project not found"
            exit 1
          fi

          echo "Project ID: $PROJECT_ID"

          {{- if .Values.projectQuota.enabled }}

          echo "Configuring project quota..."

          QUOTA_ID=$(curl -sk \
            -u "$HARBOR_USER:$HARBOR_PASSWORD" \
            "$HARBOR_URL/api/v2.0/quotas?reference=project&reference_id=$PROJECT_ID" \
            | jq -r '.[0].id')

          curl -sk \
            -u "$HARBOR_USER:$HARBOR_PASSWORD" \
            -X PUT \
            -H "Content-Type: application/json" \
            "$HARBOR_URL/api/v2.0/quotas/$QUOTA_ID" \
            -d "{\"hard\":{\"storage\":${PROJECT_QUOTA_BYTES}}}"

          echo "Quota configured"

          {{- end }}

          {{- if .Values.retention.enabled }}

          echo "Configuring retention policy..."

          POLICY_PAYLOAD=$(cat <<EOF
          {
            "algorithm":"or",
            "rules":[
              {
                "action":"retain",
                "params":{
                  "latestPushedK":5
                },
                "scope_selectors":{
                  "repository":[
                    {
                      "kind":"doublestar",
                      "decoration":"repoMatches",
                      "pattern":"**"
                    }
                  ]
                },
                "tag_selectors":[
                  {
                    "kind":"doublestar",
                    "decoration":"matches",
                    "pattern":"**"
                  }
                ],
                "template":"latestPushedK"
              },
              {
                "action":"retain",
                "params":{
                  "nDaysSinceLastPull":90
                },
                "scope_selectors":{
                  "repository":[
                    {
                      "kind":"doublestar",
                      "decoration":"repoMatches",
                      "pattern":"**"
                    }
                  ]
                },
                "tag_selectors":[
                  {
                    "kind":"doublestar",
                    "decoration":"matches",
                    "pattern":"**"
                  }
                ],
                "template":"nDaysSinceLastPull"
              }
            ]
          }
          EOF
          )

          curl -sk \
            -u "$HARBOR_USER:$HARBOR_PASSWORD" \
            -X POST \
            -H "Content-Type: application/json" \
            "$HARBOR_URL/api/v2.0/retentions/$PROJECT_ID" \
            -d "$POLICY_PAYLOAD"

          echo "Retention configured"

          {{- end }}
{{- end }}
