{{- if or .Values.retention.enabled .Values.projectQuota.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-project-config
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: harbor-project-config
          image: registry.access.redhat.com/ubi9/ubi:latest
          env:
            - name: HARBOR_URL
              value: {{ .Values.harbor.externalUrl | quote }}

            - name: HARBOR_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | quote }}
                  key: username

            - name: HARBOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | quote }}
                  key: password

            - name: PROJECT_QUOTA_BYTES
              value: {{ .Values.projectQuota.defaultQuota | quote }}

          command:
            - /bin/sh
            - -c
            - |
              set -eu

              {{- range .Values.projects }}

              PROJECT_NAME="{{ .name }}"

              echo "Configuring project ${PROJECT_NAME}"

              PROJECT_JSON=$(curl -sk \
                -u "${HARBOR_USER}:${HARBOR_PASSWORD}" \
                "${HARBOR_URL}/api/v2.0/projects/${PROJECT_NAME}")

              PROJECT_ID=$(echo "${PROJECT_JSON}" | sed -n 's/.*"project_id":[ ]*\([0-9][0-9]*\).*/\1/p')

              if [ -z "${PROJECT_ID}" ]; then
                echo "Unable to determine project ID"
                echo "${PROJECT_JSON}"
                exit 1
              fi

              echo "Project ID: ${PROJECT_ID}"

              {{- if .Values.projectQuota.enabled }}

              echo "Updating quota"

              QUOTA_JSON=$(curl -sk \
                -u "${HARBOR_USER}:${HARBOR_PASSWORD}" \
                "${HARBOR_URL}/api/v2.0/quotas?reference=project&reference_id=${PROJECT_ID}")

              QUOTA_ID=$(echo "${QUOTA_JSON}" | sed -n 's/.*"id":[ ]*\([0-9][0-9]*\).*/\1/p')

              if [ -z "${QUOTA_ID}" ]; then
                echo "Unable to determine quota ID"
                echo "${QUOTA_JSON}"
                exit 1
              fi

              curl -sk \
                -u "${HARBOR_USER}:${HARBOR_PASSWORD}" \
                -X PUT \
                -H "Content-Type: application/json" \
                "${HARBOR_URL}/api/v2.0/quotas/${QUOTA_ID}" \
                -d "{\"hard\":{\"storage\":${PROJECT_QUOTA_BYTES}}}"

              echo "Quota updated"

              {{- end }}

              {{- if .Values.retention.enabled }}

              echo "Creating retention policy"

              RETENTION_PAYLOAD='{
                "algorithm":"or",
                "rules":[
                  {
                    "action":"retain",
                    "template":"latestPushedK",
                    "params":{
                      "latestPushedK":5
                    },
                    "scope_selectors":{
                      "repository":[
                        {
                          "kind":"doublestar",
                          "decoration":"repoMatches",
                          "pattern":"**"
                        }
                      ]
                    },
                    "tag_selectors":[
                      {
                        "kind":"doublestar",
                        "decoration":"matches",
                        "pattern":"**"
                      }
                    ]
                  },
                  {
                    "action":"retain",
                    "template":"nDaysSinceLastPull",
                    "params":{
                      "nDaysSinceLastPull":90
                    },
                    "scope_selectors":{
                      "repository":[
                        {
                          "kind":"doublestar",
                          "decoration":"repoMatches",
                          "pattern":"**"
                        }
                      ]
                    },
                    "tag_selectors":[
                      {
                        "kind":"doublestar",
                        "decoration":"matches",
                        "pattern":"**"
                      }
                    ]
                  }
                ],
                "scope":{
                  "level":"project",
                  "ref":'${PROJECT_ID}'
                },
                "trigger":{
                  "kind":"Schedule",
                  "settings":{
                    "cron":"0 0 0 * * *"
                  }
                }
              }'

              curl -sk \
                -u "${HARBOR_USER}:${HARBOR_PASSWORD}" \
                -X POST \
                -H "Content-Type: application/json" \
                "${HARBOR_URL}/api/v2.0/retentions" \
                -d "${RETENTION_PAYLOAD}"

              echo "Retention policy configured"

              {{- end }}

              {{- end }}
{{- end }}
