{{- if .Values.retentionBootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "harbor.fullname" . }}-retention-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: retention-bootstrap
          image: docker.io/curlimages/curl:8.8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: HARBOR_URL
              value: {{ .Values.retentionBootstrap.harborUrl | quote }}
            - name: HARBOR_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.retentionBootstrap.existingSecret | quote }}
                  key: {{ .Values.retentionBootstrap.usernameKey | quote }}
            - name: HARBOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.retentionBootstrap.existingSecret | quote }}
                  key: {{ .Values.retentionBootstrap.passwordKey | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              echo "Bootstrap container started"

              wait_for_harbor() {
                echo "Waiting for Harbor..."
                for i in $(seq 1 60); do
                  if curl -skf "$HARBOR_URL/api/v2.0/health" >/dev/null; then
                    echo "Harbor is ready"
                    return 0
                  fi
                  sleep 10
                done
                echo "Harbor did not become ready"
                exit 1
              }

              get_json_number() {
                echo "$1" | sed -n "s/.*\"$2\":[ ]*\([0-9][0-9]*\).*/\1/p"
              }

              apply_policy() {
                PROJECT_NAME="$1"
                KEEP="$2"
                CRON="$3"
                REPO_PATTERN="$4"
                TAG_PATTERN="$5"

                echo "Configuring retention for project: $PROJECT_NAME"

                PROJECT_JSON="$(curl -skf -u "$HARBOR_USER:$HARBOR_PASSWORD" \
                  "$HARBOR_URL/api/v2.0/projects/$PROJECT_NAME")"

                PROJECT_ID="$(get_json_number "$PROJECT_JSON" "project_id")"
                RETENTION_ID="$(get_json_number "$PROJECT_JSON" "retention_id")"

                if [ -z "$PROJECT_ID" ]; then
                  echo "ERROR: Could not detect project_id for project $PROJECT_NAME"
                  echo "$PROJECT_JSON"
                  exit 1
                fi

                POLICY_JSON='{
                  "algorithm": "or",
                  "scope": {
                    "level": "project",
                    "ref": '"$PROJECT_ID"'
                  },
                  "trigger": {
                    "kind": "Schedule",
                    "settings": {
                      "cron": "'"$CRON"'"
                    }
                  },
                  "rules": [
                    {
                      "template": "latestPushedK",
                      "params": {
                        "latestPushedK": '"$KEEP"'
                      },
                      "tag_selectors": [
                        {
                          "kind": "doublestar",
                          "decoration": "matches",
                          "pattern": "'"$TAG_PATTERN"'"
                        }
                      ],
                      "scope_selectors": {
                        "repository": [
                          {
                            "kind": "doublestar",
                            "decoration": "repoMatches",
                            "pattern": "'"$REPO_PATTERN"'"
                          }
                        ]
                      }
                    }
                  ]
                }'

                if [ -n "$RETENTION_ID" ]; then
                  echo "Updating existing retention policy $RETENTION_ID"
                  curl -skf -u "$HARBOR_USER:$HARBOR_PASSWORD" \
                    -H "Content-Type: application/json" \
                    -X PUT \
                    "$HARBOR_URL/api/v2.0/retentions/$RETENTION_ID" \
                    -d "$POLICY_JSON"
                else
                  echo "Creating new retention policy"
                  curl -skf -u "$HARBOR_USER:$HARBOR_PASSWORD" \
                    -H "Content-Type: application/json" \
                    -X POST \
                    "$HARBOR_URL/api/v2.0/retentions" \
                    -d "$POLICY_JSON"
                fi

                echo "Retention configured for $PROJECT_NAME"
              }

              wait_for_harbor

              {{- range .Values.retentionBootstrap.projects }}
              apply_policy \
                {{ .name | quote }} \
                {{ .keepLatestPushed | quote }} \
                {{ .scheduleCron | quote }} \
                {{ .repoPattern | default "**" | quote }} \
                {{ .tagPattern | default "**" | quote }}
              {{- end }}
{{- end }}
