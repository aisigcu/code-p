{{- if .Values.retentionBootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "harbor.fullname" . }}-retention-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never

      containers:
      - name: retention-bootstrap

        image: docker.io/curlimages/curl:8.8.0
        imagePullPolicy: IfNotPresent

        env:
        - name: HARBOR_URL
          value: {{ .Values.retentionBootstrap.harborUrl | quote }}

        - name: HARBOR_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.retentionBootstrap.existingSecret | quote }}
              key: username

        - name: HARBOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.retentionBootstrap.existingSecret | quote }}
              key: password

        command:
        - /bin/sh
        - -ec
        - |
          echo "Bootstrap container started"

          echo "HARBOR_URL=$HARBOR_URL"

          echo "Waiting for Harbor..."

          for i in $(seq 1 60); do
            if curl -sk "$HARBOR_URL/api/v2.0/health" >/dev/null; then
              echo "Harbor is ready"
              break
            fi

            sleep 5
          done

          echo
          echo "===== HEALTH ====="
          curl -skv "$HARBOR_URL/api/v2.0/health" || true

          echo
          echo
          echo "===== PROJECTS ====="
          curl -skv \
            -u "$HARBOR_USER:$HARBOR_PASSWORD" \
            "$HARBOR_URL/api/v2.0/projects?page=1&page_size=100" || true

          echo
          echo
          echo "===== LIBRARY ====="
          curl -skv \
            -u "$HARBOR_USER:$HARBOR_PASSWORD" \
            "$HARBOR_URL/api/v2.0/projects/library" || true

          echo
          echo
          echo "Diagnostic completed"
{{- end }}
