{{- if .Values.retentionBootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "harbor.fullname" . }}-retention-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: retention-bootstrap
          image: docker.io/curlimages/curl:8.8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: HARBOR_URL
              value: {{ .Values.retentionBootstrap.harborUrl | quote }}
            - name: HARBOR_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.retentionBootstrap.existingSecret | quote }}
                  key: username
            - name: HARBOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.retentionBootstrap.existingSecret | quote }}
                  key: password
          command:
            - /bin/sh
            - -ec
            - |
              echo "Bootstrap container started"
              echo "HARBOR_URL=$HARBOR_URL"

              echo "Waiting for Harbor..."
              until curl -skf "$HARBOR_URL/api/v2.0/health" >/dev/null; do
                sleep 5
              done
              echo "Harbor is ready"

              apply_policy() {
                PROJECT_NAME="$1"
                KEEP="$2"
                CRON="$3"
                REPO_PATTERN="$4"
                TAG_PATTERN="$5"

                echo "Configuring retention for project: $PROJECT_NAME"

                PROJECT_JSON="$(curl -skf -u "$HARBOR_USER:$HARBOR_PASSWORD" \
                  "$HARBOR_URL/api/v2.0/projects/$PROJECT_NAME")"

                PROJECT_ID="$(echo "$PROJECT_JSON" | tr -d '\n\r' | sed -n 's/.*"project_id"[[:space:]]*:[[:space:]]*\([0-9][0-9]*\).*/\1/p')"
                RETENTION_ID="$(echo "$PROJECT_JSON" | tr -d '\n\r' | sed -n 's/.*"retention_id"[[:space:]]*:[[:space:]]*\([0-9][0-9]*\).*/\1/p')"

                if [ -z "$PROJECT_ID" ]; then
                  echo "ERROR: Could not detect project_id"
                  echo "$PROJECT_JSON"
                  exit 1
                fi

                echo "Project ID: $PROJECT_ID"
                echo "Retention ID: ${RETENTION_ID:-none}"

                POLICY_JSON='{
                  "algorithm": "or",
                  "scope": {
                    "level": "project",
                    "ref": '"$PROJECT_ID"'
                  },
                  "trigger": {
                    "kind": "Schedule",
                    "settings": {
                      "cron": "'"$CRON"'"
                    }
                  },
                  "rules": [
                    {
                      "template": "latestPushedK",
                      "params": {
                        "latestPushedK": '"$KEEP"'
                      },
                      "tag_selectors": [
                        {
                          "kind": "doublestar",
                          "decoration": "matches",
                          "pattern": "'"$TAG_PATTERN"'"
                        }
                      ],
                      "scope_selectors": {
                        "repository": [
                          {
                            "kind": "doublestar",
                            "decoration": "repoMatches",
                            "pattern": "'"$REPO_PATTERN"'"
                          }
                        ]
                      }
                    }
                  ]
                }'

                if [ -n "$RETENTION_ID" ]; then
                  echo "Updating retention policy $RETENTION_ID"
                  curl -skf -u "$HARBOR_USER:$HARBOR_PASSWORD" \
                    -H "Content-Type: application/json" \
                    -X PUT \
                    "$HARBOR_URL/api/v2.0/retentions/$RETENTION_ID" \
                    -d "$POLICY_JSON"
                else
                  echo "Creating retention policy"
                  curl -skf -u "$HARBOR_USER:$HARBOR_PASSWORD" \
                    -H "Content-Type: application/json" \
                    -X POST \
                    "$HARBOR_URL/api/v2.0/retentions" \
                    -d "$POLICY_JSON"
                fi

                echo "Retention configured for $PROJECT_NAME"
              }

              {{- range .Values.retentionBootstrap.projects }}
              apply_policy \
                {{ .name | quote }} \
                {{ .keepLatestPushed | quote }} \
                {{ .scheduleCron | quote }} \
                {{ .repoPattern | default "**" | quote }} \
                {{ .tagPattern | default "**" | quote }}
              {{- end }}
{{- end }}
