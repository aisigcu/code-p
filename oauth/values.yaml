oauthProxy:
  enabled: true

  image:
    repository: quay.io/openshift/origin-oauth-proxy
    tag: "4.15"
    pullPolicy: IfNotPresent

  port: 8443

  # IMPORTANT: set a fixed random 32+ char value for GitOps/ArgoCD.
  # Example: generate once with: openssl rand -base64 32
  cookieSecret: "CHANGE_ME_TO_A_FIXED_RANDOM_VALUE"
