{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "monitoring-grafana.serviceAccountName" . }}
  namespace: {{ include "monitoring-grafana.namespace" . }}
  labels:
    {{- include "monitoring-grafana.labels" . | nindent 4 }}
  {{- if or .Values.oauthProxy.enabled .Values.serviceAccount.annotations }}
  annotations:
    {{- if .Values.oauthProxy.enabled }}
    serviceaccounts.openshift.io/oauth-redirecturi.primary: "oauth/callback"
    serviceaccounts.openshift.io/oauth-redirectreference.primary: >-
      {"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"{{ include "monitoring-grafana.fullname" . }}"}}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
